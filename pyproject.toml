[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "PyDPEET"
version = "0.1.0"
description = "This project enables you to convert battery measurement data to a standardized format and process it for further analysis."
authors = [
    { name = "Anton Schlösser", email = "a.schloesser@tu-berlin.de"},
    { name = "Martin Otto", email = "m.otto.1@tu-berlin.de"},
    { name = "Alexander Günter Hinrichsen" },
    { name = "Jan Kalisch" },
    { name = "Daniel Schröder" },
    { name = "Cataldo De Simone" },
]
dependencies = [
    "pandas",
    "numpy",
    "pyarrow",
    "python-calamine",
    "numba",
    "matplotlib",
    "scipy",
    "bibtexparser",
    "scikit-learn"
]
requires-python = ">=3.12"
readme = { file = "README.md", content-type = "text/markdown" }


[tool.setuptools.packages.find]
where = ["src"]


[tool.pytest.ini_options]
pythonpath = ["."]

[project.optional-dependencies]
docs = [
  "sphinx",
  "pydata-sphinx-theme",
  "myst-parser",
  "nbsphinx",
  "sphinx-copybutton",
  "bibtexparser",
]


[tool.ruff]
line-length = 10000
target-version = "py311"  # oder py310/py312 je nach Projekt

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"] # E: Fehler, F: Fehlfunktionen, I: Importbezogene Probleme, B: Bugs, UP: Unnötige Importe
ignore = ["E501"]  # E501: Zeilenlängenbeschränkung ignorieren